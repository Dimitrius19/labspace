<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Βουλή Signal — Demand-Signal Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">▣</span>
      <div>
        <h1>Βουλή&nbsp;Signal</h1>
        <p class="sub">Parliamentary demand-signal analytics · T-Life govtech</p>
      </div>
    </div>
    <div class="meta">
      <span id="updated" class="pill">—</span>
      <span id="classifier" class="pill">—</span>
    </div>
  </header>

  <section class="kpis" id="kpis"></section>

  <section class="controls">
    <input id="search" type="search" placeholder="Search topic / summary / party…" />
    <select id="fMinistry"><option value="">All ministries</option></select>
    <select id="fParty"><option value="">All parties</option></select>
    <select id="fAB">
      <option value="">A + B</option>
      <option value="A">A · AI-addressable</option>
      <option value="B">B · political</option>
    </select>
    <label class="chk"><input type="checkbox" id="fControls" /> 🔥 controls only</label>
  </section>

  <main class="grid">
    <div class="panel charts">
      <h2>Opportunity score by ministry</h2>
      <div id="chartMinistry" class="bars"></div>
      <h2>Opposition activity by party</h2>
      <div id="chartParty" class="bars"></div>
      <h2>A / B split</h2>
      <div id="chartAB" class="donut-wrap"></div>
      <h2>Discovered topics <span class="muted">· ML</span></h2>
      <div id="mlTopics" class="topics"></div>
    </div>

    <div class="panel table-wrap">
      <h2>Ranked demand signals <span id="count" class="muted"></span></h2>
      <table id="signals">
        <thead><tr>
          <th data-k="score">Score ▾</th><th data-k="ministry_name">Ministry</th>
          <th data-k="topic">Topic</th><th>Parties</th>
          <th data-k="frequency">Freq</th><th>Theses</th><th data-k="latest_date">Latest</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <aside id="drawer" class="drawer hidden">
    <button id="closeDrawer" class="close">×</button>
    <div id="drawerBody"></div>
  </aside>

  <div id="error" class="error hidden"></div>
  <script src="app.js"></script>
</body>
</html>
