name: pages

# Deploy the Vouli Signal dashboard (static) to GitHub Pages.
on:
  workflow_dispatch: {}
  push:
    branches: ["claude/gamma-presentations-pitch-6cOq9", "main"]
    paths: ["vouli-signal/dashboard/**"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: vouli-signal/dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
